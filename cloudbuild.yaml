steps:
  - name: node:20
    entrypoint: npm
    args: ["ci"]
  - name: node:20
    entrypoint: npm
    args: ["run", "lint"]
  - name: node:20
    entrypoint: npm
    args: ["run", "typecheck"]
  - name: node:20
    entrypoint: npm
    args: ["run", "test:coverage"]
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/ecotrack/ecotrack-api:$COMMIT_SHA",
        "-f",
        "services/api/Dockerfile",
        "."
      ]
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/ecotrack/carbon-core:$COMMIT_SHA",
        "-f",
        "services/carbon-core/Dockerfile",
        "services/carbon-core"
      ]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "ecotrack-api",
        "--image",
        "us-central1-docker.pkg.dev/$PROJECT_ID/ecotrack/ecotrack-api:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--allow-unauthenticated"
      ]
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/ecotrack/ecotrack-api:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/ecotrack/carbon-core:$COMMIT_SHA
